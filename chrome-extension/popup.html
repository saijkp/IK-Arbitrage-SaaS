<!DOCTYPE html>
<html>
<head>
  <style>
    :root { --navy: #0a192f; --gold: #d4af37; --green: #27ae60; --light: #f4f7f6; }
    body { width: 350px; font-family: sans-serif; margin: 0; background: var(--light); }
    .header { background: var(--navy); color: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); }
    .scan-banner { background: #fff9c4; color: #856404; padding: 5px; font-size: 10px; text-align: center; }
    .container { padding: 12px; }
    .result-card { background: white; border-radius: 8px; padding: 10px; margin-bottom: 10px; display: flex; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .result-card img { width: 60px; height: 60px; object-fit: cover; }
    .btn-row { display: flex; gap: 5px; margin-top: 8px; }
    .btn-secure { flex: 1; background: var(--gold); color: var(--navy); text-decoration: none; text-align: center; padding: 6px; font-size: 10px; border-radius: 4px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header"><h1 style="font-size:16px; margin:0; color:var(--gold);">IK ARBITRAGE</h1></div>
  <div class="scan-banner">Free Daily Scans: <span id="scan-count">5/5</span></div>
  <div class="container"><div id="out"></div></div>
</body>
</html>
